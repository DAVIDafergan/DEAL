<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2A2118"/>
      <stop offset="100%" stop-color="#3B291A"/>
    </linearGradient>
    <linearGradient id="og-main" x1="0" y1="0" x2="44" y2="44" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#C1592B"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </linearGradient>
    <linearGradient id="og-slash" x1="30" y1="6" x2="16" y2="38" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#B8860B" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#C1592B" stop-opacity="0.5"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="42%">
      <stop offset="0%" stop-color="#C1592B" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#C1592B" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Logo mark — 44x44 viewBox scaled 6x (264x264 px), mark center at (600, 258) -->
  <g transform="translate(468, 100) scale(6)">
    <path d="M11 7 L11 37" stroke="url(#og-main)" stroke-width="4" stroke-linecap="round" fill="none"/>
    <path d="M11 7 C11 7 35 7 35 22 C35 37 11 37 11 37" stroke="url(#og-main)" stroke-width="3.5" stroke-linecap="round" fill="none"/>
    <path d="M30 9 L19 35" stroke="url(#og-slash)" stroke-width="2.2" stroke-linecap="round" fill="none"/>
    <circle cx="11" cy="22" r="2.2" fill="url(#og-main)"/>
  </g>

  <!-- Wordmark -->
  <text
    x="600" y="450"
    text-anchor="middle"
    font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="90"
    font-weight="800"
    fill="#FAF6EF"
    letter-spacing="3"
  >Dealim</text>

  <!-- Tagline -->
  <text
    x="600" y="505"
    text-anchor="middle"
    font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="30"
    font-weight="600"
    fill="#C1592B"
  >צימרים ווילות בישראל — ישירות מבעלי הנכס</text>
</svg>
